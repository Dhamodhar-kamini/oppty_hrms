<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oppty HRMS Admin Login</title>
    <!-- Link to the separate CSS file -->
     <link rel="icon" type="image/png" sizes="32x32" href="../assets/opptylogo2.png">
    <link rel="stylesheet" href="adminlogin.css">
</head>
<body>

    <div class="login-container">
        <div class="login-card">
            <!-- Ensure your logo image is named 'logo.png' and in the same folder -->
            <div class="logo-wrapper">
                <img src="../assets/opptylogo.png" alt="Oppty Logo" class="logo">
            </div>
            
            <h2>Welcome Back</h2>
            <p class="subtitle">Enter your credentials to access the admin panel.</p>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>

                <div class="form-footer">
                    <label class="remember-me">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#" class="forgot-pass">Forgot Password?</a>
                </div>

                <button type="submit" class="btn-login">Sign In</button>
                
                <!-- Hidden error message -->
                <p id="errorMsg" class="error-msg">Invalid email or password. Please try again.</p>
            </form>
        </div>
    </div>

    <!-- Link to the separate JS file -->
    <script src="adminlogin.js"></script>
</body>
</html>
